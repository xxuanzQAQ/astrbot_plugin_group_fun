name: astrbot_plugin_group_fun
display_name: 自爆
desc: "娱乐插件，随机禁言倒霉蛋，以及和群友自爆("
help: |
  【天弃之子】发送"天弃之子"随机选一位群友禁言
  【同归于尽】发送"同归于尽@群友"拉人一起禁言；发送"允许被同归/禁止被同归"设置自己是否可被同归
  【精致睡眠】发送"睡眠套餐/精致睡眠/来一份精致睡眠套餐"给自己禁言8小时
  管理员可发送"关闭天弃之子/关闭同归于尽/关闭睡眠"来关闭对应功能
version: v1.0.0
author: 小轩
repo: "https://github.com/xxuanzQAQ/astrbot_plugin_group_fun"
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.13.0"

