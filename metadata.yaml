name: astrbot_plugin_group_fun
display_name: 群娱乐禁言
desc: "群娱乐禁言插件，包含天弃之子（随机禁言）、同归于尽（拉人一起禁言）、精致睡眠（8小时禁言套餐）三大功能"
help: |
  【天弃之子】发送"天弃之子"随机选一位群友禁言
  【同归于尽】发送"同归于尽@群友"拉人一起禁言；发送"允许被同归/禁止被同归"设置自己是否可被同归
  【精致睡眠】发送"睡眠套餐/精致睡眠/来一份精致睡眠套餐"给自己禁言8小时
  管理员可发送"关闭天弃之子/关闭同归于尽/关闭睡眠"来关闭对应功能
